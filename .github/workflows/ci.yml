name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: VS2022
          - os: ubuntu-latest
            platform: Ninja

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: ${{ runner.os }}-cpm-${{ hashFiles('CMakeLists.txt', 'cmake/Testing.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Build and test (build.py)
        run: python build.py --build -pl ${{ matrix.platform }} -c Release

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck and Ninja
        run: sudo apt-get update && sudo apt-get install -y cppcheck ninja-build

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: ${{ runner.os }}-cpm-${{ hashFiles('CMakeLists.txt', 'cmake/Testing.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DLOGGER_BUILD_TESTS=OFF -DLOGGER_ENABLE_CPPCHECK=ON

      - name: Build with cppcheck
        run: cmake --build build --target Logger
