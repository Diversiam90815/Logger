name: Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm_cache

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Ninja + the MSVC toolchain on PATH rather than pinning a Visual Studio generator
      # version (e.g. "VS2022"/"VS2026") - runner images roll the installed VS version
      # forward over time, and pinning a specific major version breaks as soon as it's gone.
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache CPM packages
        uses: actions/cache@v4
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: ${{ runner.os }}-cpm-${{ hashFiles('CMakeLists.txt', 'cmake/Testing.cmake') }}
          restore-keys: |
            ${{ runner.os }}-cpm-

      - name: Build and test (build.py)
        run: python build.py --build -pl Ninja -c Release
